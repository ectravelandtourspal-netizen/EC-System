<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Management Dashboard</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <img class="logo-image" src="favicon.png" alt="favicon logo" />
      <div>
        <h1>Booking Management</h1>
        <p id="pageSubtitle" class="subtitle">Home Page</p>
      </div>
    </header>

    <section class="menu-card" aria-label="Main Menu">
      <h2>Quick Actions</h2>
      <p>Select one workflow page.</p>
      <div class="menu-grid">
        <a class="menu-btn" href="new-bookings.html">New Booking Pending Send WhatsApp <span id="homeNewPendingCount" class="menu-badge" hidden>0</span></a>
        <a class="menu-btn" href="confirmed-whatsapp.html">Confirmed Guest Send WhatsApp <span id="homeConfirmedPendingCount" class="menu-badge" hidden>0</span></a>
        <a class="menu-btn" href="bookings-dashboard.html">Bookings Dashboard <span id="homeDashboardPendingCount" class="menu-badge" hidden>0</span></a>
        <a class="menu-btn" href="payment-receipt-encoding.html">Guest Payment Receipt Encoding <span id="homePaymentNoInvoiceCount" class="menu-badge" hidden>0</span></a>
        <a class="menu-btn" href="commissions-payment-receipt-encoding.html">Encoding Payment Receipt in Commissions <span id="homeCommissionsUnpaidDateCount" class="menu-badge" hidden>0</span></a>
        <a class="menu-btn" href="commissions-payment-summary.html">Commissions Payment Summary</a>
      </div>
    </section>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
